<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASNU Prosthetic Donation | Sonny's Skyward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87CEEB 0%, #BAE6FD 50%, #E0F2FE 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        /* Hidden Scrollbar for the galleries */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bird-wing { width: 20px; height: 10px; border: 3px solid #1e3a8a; border-bottom: none; border-left: none; border-right: none; border-radius: 50% 50% 0 0; }
        .wing-right { transform: rotate(15deg) scaleX(-1); margin-left: -4px; }
        .wing-left { transform: rotate(-15deg); }
    </style>
</head>
<body class="text-blue-900 font-sans pb-20 relative">

    <nav class="sticky top-0 z-50 p-6 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-6">
            <span class="font-black text-blue-500 text-xl tracking-tighter italic">SONNY.SYS</span>
            <div class="flex space-x-12 font-bold uppercase text-xs tracking-widest text-blue-800">
                <a href="index.html" class="hover:text-blue-500">Home</a>
                <a href="projects.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Back to Projects</a>
            </div>
        </div>
    </nav>

    <header class="text-center py-16 px-6">
        <h1 class="text-6xl font-black text-white drop-shadow-md mb-4 uppercase tracking-tighter italic">ASNU Prosthetic Donation</h1>
        <p class="text-xl font-bold text-blue-800/80 uppercase tracking-widest">Biomedical Engineering & e-NABLE</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-12">
        
        <section class="glass-panel p-10 rounded-[40px]">
            <h2 class="text-2xl font-black mb-4 uppercase text-blue-950 italic">Introduction</h2>
            <p id="intro-text" class="text-lg leading-relaxed text-blue-900/90 font-medium"></p>
        </section>

        <section class="glass-panel p-8 rounded-[40px] border-l-8 border-blue-600 max-w-4xl mx-auto">
            <h2 class="text-2xl font-black mb-6 uppercase text-blue-950 italic">Materials & Tools</h2>
            <ul class="grid grid-cols-1 gap-4 text-lg font-bold text-blue-800" id="materials-list"></ul>
        </section>

        <div id="steps-container" class="space-y-16"></div>

        <div id="conclusion-target" class="mt-20"></div>

    </main>

    <script>
        // ==========================================
        // SINGLE DATA OBJECT: EDIT EVERYTHING HERE
        // ==========================================
        const projectData = {
            intro: "The objective of this project was to manufacture and deliver functional, non-medical prosthetics to upper-body amputees in Uganda by establishing a local school-based chapter of the 'e-NABLE' volunteer network. These 3D-printed devices are designed to provide a mechanical hand that can grip through the movement of a functioning wrist or elbow joint. This initiative addresses a critical need, particularly for children who outgrow expensive medical-grade prosthetics, by providing an affordable and easily replaceable alternative.",
            
            materials: [
                "Design Files: Open-source STL files for non-medical prosthetics sourced from the e-NABLE forum.",
                "Hardware Kits: Component kits including pulleys used for the mechanical assembly of each hand.",
                "Tools: 3D printers and computers running CAD software for model modification.",
                "Postage: International shipping materials and funds for delivery to the Amputee Self-Help Network Uganda (ASNU)."
            ],

            phases: [
                {
                    title: "Sizing the Arms",
                    // Add your image filenames to this array
                    gallery: ["armsizing1.png","amrahamUp.jpg", "abrahamD.jpg" ], 
                    text: "The process began by using a CAD program to meticulously resize the open-source STL files to fit the specific body measurements and needs of each recipient. This customization ensured that the final 3D-printed components were tailored correctly so the user could achieve functional movement and a reliable grip."
                },
                {
                    title: "3D Printing the Arms",
                    // Add your image filenames to this array
                    gallery: ["3dprinterarm.png", "arm3dP.HEIC","screw.png","scr.png"], 
                    text: "Once the digital models were scaled, I led a team of students and scouts in operating school 3D printers to produce the multiple parts required for each prosthetic. This phase involved translating the modified CAD designs into physical components, ensuring that every printed piece met the quality standards necessary for a durable and working device."
                },
                {
                    title: "Assembling the Arms",
                    // Add your image filenames to this array
                    gallery: ["allpartsamr.jpg", "assemblingArm.jpg","armopen.png","armclosed.png"], 
                    text: "The final assembly required a dedicated team to piece together the 3D-printed parts using the specialized pulley component kits. While a single person could spend up to 20 hours on one device, I organized the team to complete multiple prosthetics simultaneously. We threaded the tension lines through the printed fingers and tested the grip mechanism before shipping the finished hands to Uganda to be fitted to the recipients."
                }
            ],

            conclusion: "This project successfully merged digital fabrication with project management to deliver life-changing tools to those in need. Through this experience, I gained technical proficiency in CAD manipulation and 3D printing, while also developing the leadership and logistics skills required to coordinate a volunteer team and manage international shipping. By providing these low-cost, functional prosthetics, we created a sustainable and impactful solution for amputees who otherwise lack access to expensive medical care."
        };

        // ==========================================
        // RENDER LOGIC (DO NOT EDIT BELOW)
        // ==========================================

        document.getElementById('intro-text').innerText = projectData.intro;

        const matTarget = document.getElementById('materials-list');
        projectData.materials.forEach(m => {
            const li = document.createElement('li');
            li.className = "flex items-start";
            li.innerHTML = m; // Splits emoji for formatting
            matTarget.appendChild(li);
        });

        const container = document.getElementById('steps-container');
        projectData.phases.forEach((step, index) => {
            const section = document.createElement('section');
            const isEven = index % 2 === 0;
            section.className = `flex flex-col ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} items-center gap-10`;

            let imageHTML = `<div class="flex gap-4 overflow-x-auto hide-scroll p-2 snap-x">`;
            step.gallery.forEach(img => {
                imageHTML += `<div class="min-w-full snap-center"><img src="images/${img}" class="w-full h-80 object-cover rounded-2xl shadow-md border border-white"></div>`;
            });
            imageHTML += `</div><p class="text-center text-[10px] font-bold uppercase text-blue-400 mt-2">← Swipe Gallery →</p>`;

            section.innerHTML = `
                <div class="w-full md:w-1/2 glass-panel p-4 rounded-3xl overflow-hidden">${imageHTML}</div>
                <div class="w-full md:w-1/2 glass-panel p-8 rounded-[30px]">
                    <p class="text-blue-500 font-black text-xs uppercase mb-2 tracking-widest">Phase 0${index + 1}</p>
                    <h3 class="text-2xl font-black text-blue-900 mb-4 italic uppercase tracking-tighter">${step.title}</h3>
                    <p class="text-lg leading-relaxed font-medium text-blue-900/80">${step.text}</p>
                </div>`;
            container.appendChild(section);
        });

        const conclusionTarget = document.getElementById('conclusion-target');
        conclusionTarget.innerHTML = `
            <section class="glass-panel p-10 rounded-[40px] text-center max-w-4xl mx-auto mb-20">
                <h2 class="text-3xl font-black mb-6 uppercase tracking-tight text-blue-950 italic"> Project Summary</h2>
                <p class="text-xl leading-relaxed text-blue-900/90 font-medium italic">"${projectData.conclusion}"</p>
            </section>`;
    </script>
</body>
</html>
