<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pwnagotchi | Sonny's Skyward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87CEEB 0%, #BAE6FD 50%, #E0F2FE 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        /* Hidden Scrollbar for the galleries */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bird-wing { width: 20px; height: 10px; border: 3px solid #1e3a8a; border-bottom: none; border-left: none; border-right: none; border-radius: 50% 50% 0 0; }
        .wing-right { transform: rotate(15deg) scaleX(-1); margin-left: -4px; }
        .wing-left { transform: rotate(-15deg); }
    </style>
</head>
<body class="text-blue-900 font-sans pb-20 relative">

    <nav class="sticky top-0 z-50 p-6 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-6">
            <span class="font-black text-blue-500 text-xl tracking-tighter italic">SONNY.SYS</span>
            <div class="flex space-x-12 font-bold uppercase text-xs tracking-widest text-blue-800">
                <a href="index.html" class="hover:text-blue-500">Home</a>
                <a href="projects.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Back to Projects</a>
            </div>
        </div>
    </nav>

    <header class="text-center py-16 px-6">
        <h1 class="text-6xl font-black text-white drop-shadow-md mb-4 uppercase tracking-tighter italic">Pwnagotchi</h1>
        <p class="text-xl font-bold text-blue-800/80 uppercase tracking-widest">Mobile WiFi Auditing Build</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-12">
        
        <section class="glass-panel p-10 rounded-[40px]">
            <h2 class="text-2xl font-black mb-4 uppercase text-blue-950 italic">Introduction</h2>
            <p id="intro-text" class="text-lg leading-relaxed text-blue-900/90 font-medium"></p>
        </section>

        <section class="glass-panel p-8 rounded-[40px] border-l-8 border-blue-600 max-w-4xl mx-auto">
            <h2 class="text-2xl font-black mb-6 uppercase text-blue-950 italic">Materials & Tools</h2>
            <ul class="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg font-bold text-blue-800" id="materials-list"></ul>
        </section>

        <div id="steps-container" class="space-y-16"></div>

        <div id="conclusion-target" class="mt-20"></div>

    </main>

    <script>
        // ==========================================
        // SINGLE DATA OBJECT: EDIT EVERYTHING HERE
        // ==========================================
        const projectData = {
            intro: "The Pwnagotchi is a popular A2C-based 'AI' for WiFi auditing, but most builds rely on bulky battery hats or standard cases that sacrifice portability. For this project, my goal was to push the limits of the form factor. I set out to create a truly pocket-sized, slim-profile Pwnagotchi by physically modifying the hardware, integrating a dedicated power source, and designing a custom-fitted enclosure from the ground up to ensure it was both functional and rugged for mobile use.",
            
            materials: [
                "Microcontroller: Raspberry Pi Zero 2W",
                "Display: Waveshare e-Paper v4",
                "Connectivity: U.FL Antenna & pigtail",
                "Power: Lithium Polymer (LiPo) Battery",
                "Fabrication: 3D Printer & Soldering Iron"
            ],

            phases: [
                {
                    title: "Hardware Customization & Slimming",
                    gallery: ["antennaBefore.jpg", "antennaAfter.jpg", "ScreenAfter.jpg", "SlimSide.jpg"], // Just add filenames here
                    text: "To achieve the thinnest profile possible, I moved beyond simple assembly and performed several permanent hardware modifications. This involved desoldering the bulky ribbon cable connector on the Waveshare screen to allow it to sit flush against the board. I also clipped the GPIO headers to their minimum height, significantly reducing the 'sandwich' thickness of the device. The most technical challenge was the connectivity upgrade; I performed precision soldering to attach a U.FL antenna directly to the Pi. This required a steady hand and high heat control given the incredibly small solder pads."
                },
                {
                    title: "Enclosure Design & Power Integration",
                    gallery: ["BatCB.jpg", "BatCF.jpg", "BatCS.jpg","SlimCF.jpg","SlimCase.jpg"], // Add more to expand the carousel
                    text: "Because my hardware modifications changed the physical dimensions of the device, off-the-shelf 3D models were no longer compatible. I designed a bespoke, minimalist case to hug the slimmed-down internals. For the power system, I integrated a lithium battery that connects to the Pi via a shortened micro-USB cable for reliable power delivery. To house this, I engineered a secondary case iteration that includes a dedicated battery compartment and a reinforced keychain loop. This transformation turned the Pwnagotchi from a desk-bound gadget into a fully portable, 'everyday carry' tool."
                }
            ],

            conclusion: "This project taught me how to do precise hardware hacking and 3D design. I learned how to solder very small parts, like the antenna and screen connections, to make the device as thin as possible. Since my changes meant standard cases wouldn't work, I used CAD to design and 3D print a custom slim housing and a battery case with a keychain. This project shows I can take a complex idea, modify the hardware to make it better, and build my own custom parts to make it a finished, portable product."
        };

        // ==========================================
        // RENDER LOGIC (No need to touch this)
        // ==========================================

        document.getElementById('intro-text').innerText = projectData.intro;

        const matTarget = document.getElementById('materials-list');
        projectData.materials.forEach(m => {
            const li = document.createElement('li');
            li.className = "flex items-center";
            li.innerText = m;
            matTarget.appendChild(li);
        });

        const container = document.getElementById('steps-container');
        projectData.phases.forEach((step, index) => {
            const section = document.createElement('section');
            const isEven = index % 2 === 0;
            section.className = `flex flex-col ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} items-center gap-10`;

            let imageHTML = `<div class="flex gap-4 overflow-x-auto hide-scroll p-2 snap-x">`;
            step.gallery.forEach(img => {
                imageHTML += `<div class="min-w-full snap-center"><img src="images/${img}" class="w-full h-80 object-cover rounded-2xl shadow-md border border-white"></div>`;
            });
            imageHTML += `</div><p class="text-center text-[10px] font-bold uppercase text-blue-400 mt-2">← Swipe Gallery →</p>`;

            section.innerHTML = `
                <div class="w-full md:w-1/2 glass-panel p-4 rounded-3xl overflow-hidden">${imageHTML}</div>
                <div class="w-full md:w-1/2 glass-panel p-8 rounded-[30px]">
                    <p class="text-blue-500 font-black text-xs uppercase mb-2 tracking-widest">Phase ${index + 1}</p>
                    <h3 class="text-2xl font-black text-blue-900 mb-4 italic uppercase tracking-tighter">${step.title}</h3>
                    <p class="text-lg leading-relaxed font-medium text-blue-900/80">${step.text}</p>
                </div>`;
            container.appendChild(section);
        });

        const conclusionTarget = document.getElementById('conclusion-target');
        conclusionTarget.innerHTML = `
            <section class="glass-panel p-10 rounded-[40px] text-center max-w-4xl mx-auto mb-20">
                <h2 class="text-3xl font-black mb-6 uppercase tracking-tight text-blue-950 italic">Mission Summary</h2>
                <p class="text-xl leading-relaxed text-blue-900/90 font-medium italic">"${projectData.conclusion}"</p>
            </section>`;
    </script>
</body>
</html>
