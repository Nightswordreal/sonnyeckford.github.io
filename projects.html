<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Sonny's Skyward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sky Theme Gradient */
        body { 
            background: linear-gradient(to bottom, #87CEEB 0%, #BAE6FD 50%, #E0F2FE 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 3D CAROUSEL STYLES --- */
        .carousel-container {
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px; height: 350px; position: relative;
        }
        .carousel-item {
            position: absolute; width: 320px; height: 220px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: #fff; opacity: 0; pointer-events: none;
        }
        /* State classes for the 3D effect */
        .item-active { opacity: 1; z-index: 10; transform: translateZ(100px); pointer-events: auto; border: 4px solid #1e40af; }
        .item-prev { opacity: 0.5; z-index: 5; transform: translateX(-250px) scale(0.8) rotateY(25deg); }
        .item-next { opacity: 0.5; z-index: 5; transform: translateX(250px) scale(0.8) rotateY(-25deg); }

        /* --- M BIRD STYLES --- */
        .bird-container { display: flex; align-items: center; justify-content: center; width: 40px; height: 15px; opacity: 0.5; position: absolute; }
        .bird-wing { width: 20px; height: 12px; border: 3px solid #1e3a8a; border-bottom: none; border-left: none; border-right: none; border-radius: 50% 50% 0 0; }
        .wing-right { transform: rotate(15deg) scaleX(-1); margin-left: -4px; }
        .wing-left { transform: rotate(-15deg); }
        
        /* Glassmorphism Tiles */
        .project-tile {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 2px solid white;
            transition: all 0.3s ease;
        }
        .project-tile:hover { 
            transform: translateY(-8px); 
            background: rgba(255, 255, 255, 0.9); 
            box-shadow: 0 20px 40px rgba(30, 58, 138, 0.15);
        }
    </style>
</head>
<body class="text-blue-900 font-sans pb-20">

    <nav class="sticky top-0 z-50 p-6 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-6">
            <span class="font-black text-blue-500 text-xl tracking-tighter italic">SONNY.SYS</span>
            <div class="flex space-x-12 font-bold uppercase text-xs tracking-widest text-blue-800">
                <a href="index.html" class="hover:text-blue-500 transition-colors">Start</a>
                <a href="projects.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Projects</a>
                <a href="blank.html" class="hover:text-blue-500 transition-colors">Blank</a>
            </div>
        </div>
    </nav>

    <section class="py-12 relative">
        <div class="bird-container top-10 left-20"><div class="bird-wing wing-left"></div><div class="bird-wing wing-right"></div></div>
        
        <div class="carousel-container" id="carousel-target">
            </div>
    </section>

    <main class="max-w-4xl mx-auto px-6 relative">
        <h2 class="text-center font-black text-4xl uppercase tracking-tighter mb-12 text-white drop-shadow-md italic">
            Mission Logs
        </h2>

        <div class="space-y-8" id="tile-target">
            </div>

        <div class="bird-container bottom-0 -right-10"><div class="bird-wing wing-left"></div><div class="bird-wing wing-right"></div></div>
    </main>

    <script>
        // ==========================================
        // 1. PROJECT CONFIGURATION
        // Add or remove projects here. 
        // "id" must match the name of your .html files (e.g. pwn.html)
        // ==========================================
        const myProjects = [
            { 
                id: 'arm', 
                image: '3dprinterarm.png', 
                title: 'Prosthetics for Uganda', 
                desc: 'Designing low-cost, 3D-printable solutions for functional mobility in resource-limited areas.' 
            },
            { 
                id: 'pwn', 
                image: 'SlimCF.jpg', 
                title: 'Pwnagotchi Slim', 
                desc: 'A hardware-integrated cybersecurity companion featuring a custom 3D printed enclosure.' 
            },
            { 
                id: 'rocket', 
                image: 'rocket.jpg', 
                title: 'Rocketry Challenge', 
                desc: 'Aerospace simulation and high-altitude flight testing for the American Rocketry Challenge.' 
            },
            { 
                id: 'plane', 
                image: 'posterplane.heic', 
                title: '3D Printed RC Plane', 
                desc: 'Testing aerodynamic limits and weight-to-power ratios in fully 3D printed airframes.' 
            }
        ];

        // ==========================================
        // 2. BUILD THE PAGE ELEMENTS
        // ==========================================
        const carousel = document.getElementById('carousel-target');
        const tileTarget = document.getElementById('tile-target');

        myProjects.forEach((p, index) => {
            // Create Carousel HTML
            const cDiv = document.createElement('div');
            cDiv.className = 'carousel-item';
            cDiv.innerHTML = `
                <img src="images/${p.image}" class="w-full h-full object-cover">
                <div class="absolute bottom-0 w-full bg-blue-900/80 text-white text-[10px] p-2 text-center font-bold uppercase">
                    ${p.title}
                </div>`;
            carousel.appendChild(cDiv);

            // Create Vertical Tile HTML
            const tDiv = document.createElement('a');
            tDiv.href = `${p.id}.html`; // Links to pwn.html, rocket.html, etc.
            tDiv.className = "project-tile flex flex-col md:flex-row items-center p-6 rounded-[35px] shadow-lg overflow-hidden";
            tDiv.innerHTML = `
                <img src="images/${p.image}" class="w-full md:w-56 h-36 object-cover rounded-2xl mb-6 md:mb-0 md:mr-10 shadow-md">
                <div class="flex-1">
                    <h3 class="text-2xl font-black text-blue-900 mb-2 uppercase italic tracking-tighter">${p.title}</h3>
                    <p class="text-blue-800/80 font-medium leading-relaxed">${p.desc}</p>
                    <div class="mt-4 flex items-center text-blue-500 font-black text-xs uppercase tracking-widest">
                        <span>View Mission Details</span>
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                </div>`;
            tileTarget.appendChild(tDiv);
        });

        // ==========================================
        // 3. CAROUSEL AUTO-SCROLL LOGIC
        // ==========================================
        let currentIndex = 0;
        const items = document.querySelectorAll('.carousel-item');

        function updateCarousel() {
            items.forEach((item, i) => {
                item.className = 'carousel-item'; // Reset
                if (i === currentIndex) {
                    item.classList.add('item-active');
                } else if (i === (currentIndex - 1 + items.length) % items.length) {
                    item.classList.add('item-prev');
                } else if (i === (currentIndex + 1) % items.length) {
                    item.classList.add('item-next');
                }
            });
            // Prepare for next scroll
            currentIndex = (currentIndex + 1) % items.length;
        }

        // Initialize and set interval for 3 seconds
        if(items.length > 0) {
            updateCarousel();
            setInterval(updateCarousel, 3000);
        }
    </script>

</body>
</html>
