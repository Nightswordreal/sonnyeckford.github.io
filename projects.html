<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ebf8ff; overflow-x: hidden; }
        .nav-active { border-bottom: 4px solid #1e40af; color: #1e40af; }
        
        .carousel-container {
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px; height: 400px; position: relative;
        }

        .carousel-item {
            position: absolute; width: 350px; height: 250px;
            transition: all 0.5s ease-in-out; border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #fff; opacity: 0; pointer-events: none;
        }

        .item-active { opacity: 1; z-index: 10; transform: translateZ(100px); pointer-events: auto; border: 4px solid #1e40af; }
        .item-prev { opacity: 0.6; z-index: 5; transform: translateX(-280px) scale(0.8) rotateY(20deg); }
        .item-next { opacity: 0.6; z-index: 5; transform: translateX(280px) scale(0.8) rotateY(-20deg); }
    </style>
</head>
<body>

    <nav class="bg-white shadow-md mb-6">
        <div class="max-w-4xl mx-auto flex justify-center space-x-12 p-5 font-bold uppercase tracking-wide">
            <a href="index.html" class="hover:text-blue-800 pb-1">Start</a>
            <a href="projects.html" class="nav-active pb-1">Projects</a>
            <a href="blank.html" class="hover:text-blue-800 pb-1">Blank</a>
        </div>
    </nav>

    <section class="max-w-6xl mx-auto mb-10 text-center">
        <h2 class="text-blue-900 font-black text-3xl mb-8 uppercase">Project Gallery</h2>
        <div class="carousel-container" id="carousel-target">
            </div>

        <div class="flex justify-center space-x-4 mt-6">
            <button onclick="rotateCarousel(-1)" class="bg-blue-800 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 shadow-lg">←</button>
            <button onclick="rotateCarousel(1)" class="bg-blue-800 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 shadow-lg">→</button>
        </div>
    </section>

    <script>
        // --- CONFIGURATION: JUST ADD YOUR FILENAMES HERE ---
        const projectImages = [
            { file: 'DVEE6368.JPG', title: 'Prosthetics for Uganda' },
            { file: 'LSPY6041.JPG', title: 'Pwnagotchi Slim' },
            { file: 'TDHS4413.JPG', title: 'Rocket Simulation' },
        ];

        const container = document.getElementById('carousel-target');
        let currentIndex = 0;

        // Automatically create the HTML for each image
        projectImages.forEach((imgObj, index) => {
            const div = document.createElement('div');
            div.className = 'carousel-item';
            div.innerHTML = `
                <img src="images/${imgObj.file}" class="w-full h-full object-cover">
                <div class="absolute bottom-0 bg-blue-900/90 text-white p-3 w-full text-center text-sm font-bold">
                    ${imgObj.title}
                </div>
            `;
            container.appendChild(div);
        });

        const items = document.querySelectorAll('.carousel-item');

        function updateDisplay() {
            items.forEach((item, i) => {
                item.className = 'carousel-item'; // Reset classes
                
                if (i === currentIndex) {
                    item.classList.add('item-active');
                } else if (i === (currentIndex - 1 + items.length) % items.length) {
                    item.classList.add('item-prev');
                } else if (i === (currentIndex + 1) % items.length) {
                    item.classList.add('item-next');
                }
            });
        }

        function rotateCarousel(direction) {
            currentIndex = (currentIndex + direction + items.length) % items.length;
            updateDisplay();
        }

        // Initialize the first view
        updateDisplay();
    </script>
</body>
</html>
