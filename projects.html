<script>
    // ==========================================
    // CONFIGURATION: UPDATED FILENAMES
    // ==========================================
    const myProjects = [
        { 
            id: 'arm', // Points to arm.html
            image: 'uganda.jpg', 
            title: 'Prosthetics for Uganda', 
            desc: 'Low-cost 3D printed solutions for functional mobility.' 
        },
        { 
            id: 'pwn', // Points to pwn.html
            image: 'pwnagotchi.png', 
            title: 'Pwnagotchi Slim', 
            desc: 'Custom-built WiFi auditing companion with integrated hardware.' 
        },
        { 
            id: 'rocket', // Points to rocket.html
            image: 'rocket.jpg', 
            title: 'Rocketry Challenge', 
            desc: 'Aerospace simulation and construction for high-altitude flight.' 
        },
        { 
            id: 'plane', // Points to plane.html
            image: 'rc-plane.jpg', 
            title: '3D Printed Aircraft', 
            desc: 'Testing the limits of lightweight airframe manufacturing.' 
        }
    ];

    // ==========================================
    // LOGIC: GENERATING THE PAGE
    // ==========================================
    const carousel = document.getElementById('carousel-target');
    const tileTarget = document.getElementById('tile-target');

    myProjects.forEach((p, index) => {
        // Build Carousel Item
        const cDiv = document.createElement('div');
        cDiv.className = 'carousel-item';
        cDiv.innerHTML = `
            <img src="images/${p.image}" class="w-full h-full object-cover">
            <div class="absolute bottom-0 w-full bg-blue-900/80 text-white text-[10px] p-2 text-center font-bold uppercase">
                ${p.title}
            </div>`;
        carousel.appendChild(cDiv);

        // Build Vertical Tile - UPDATED LINK LOGIC
        const tDiv = document.createElement('a');
        tDiv.href = `${p.id}.html`; // This creates links like pwn.html, arm.html, etc.
        tDiv.className = "project-tile flex flex-col md:flex-row items-center bg-white/70 backdrop-blur-sm p-6 rounded-3xl shadow-lg transition-all border-2 border-white overflow-hidden";
        tDiv.innerHTML = `
            <img src="images/${p.image}" class="w-full md:w-48 h-32 object-cover rounded-2xl mb-4 md:mb-0 md:mr-8 shadow-md">
            <div>
                <h3 class="text-2xl font-black text-blue-900">${p.title}</h3>
                <p class="text-blue-800/70 font-medium mt-1">${p.desc}</p>
                <span class="inline-block mt-4 text-xs font-black uppercase text-blue-500 tracking-widest">Open Project File →</span>
            </div>`;
        tileTarget.appendChild(tDiv);
    });

    // ==========================================
    // ANIMATION: AUTO-SCROLL CAROUSEL
    // ==========================================
    let currentIndex = 0;
    const items = document.querySelectorAll('.carousel-item');

    function updateCarousel() {
        items.forEach((item, i) => {
            item.className = 'carousel-item';
            if (i === currentIndex) item.classList.add('item-active');
            else if (i === (currentIndex - 1 + items.length) % items.length) item.classList.add('item-prev');
            else if (i === (currentIndex + 1) % items.length) item.classList.add('item-next');
        });
        currentIndex = (currentIndex + 1) % items.length;
    }

    if(items.length > 0) {
        updateCarousel();
        setInterval(updateCarousel, 3000); // Scrolls every 3 seconds
    }
</script>
