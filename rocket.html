<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocketry Challenge | Sonny's Skyward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87CEEB 0%, #BAE6FD 50%, #E0F2FE 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        /* Hidden Scrollbar for the galleries */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bird-wing { width: 20px; height: 10px; border: 3px solid #1e3a8a; border-bottom: none; border-left: none; border-right: none; border-radius: 50% 50% 0 0; }
        .wing-right { transform: rotate(15deg) scaleX(-1); margin-left: -4px; }
        .wing-left { transform: rotate(-15deg); }
    </style>
</head>
<body class="text-blue-900 font-sans pb-20 relative">

    <nav class="sticky top-0 z-50 p-6 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-6">
            <span class="font-black text-blue-500 text-xl tracking-tighter italic">SONNY.SYS</span>
            <div class="flex space-x-12 font-bold uppercase text-xs tracking-widest text-blue-800">
                <a href="index.html" class="hover:text-blue-500">Home</a>
                <a href="projects.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Back to Projects</a>
            </div>
        </div>
    </nav>

    <header class="text-center py-16 px-6">
        <h1 class="text-6xl font-black text-white drop-shadow-md mb-4 uppercase tracking-tighter italic">Rocketry Challenge</h1>
        <p class="text-xl font-bold text-blue-800/80 uppercase tracking-widest">Aerospace Systems & Flight Operations</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-12">
        
        <section class="glass-panel p-10 rounded-[40px]">
            <h2 class="text-2xl font-black mb-4 uppercase text-blue-950 italic">Introduction</h2>
            <p id="intro-text" class="text-lg leading-relaxed text-blue-900/90 font-medium"></p>
        </section>

        <section class="glass-panel p-8 rounded-[40px] border-l-8 border-blue-600 max-w-4xl mx-auto">
            <h2 class="text-2xl font-black mb-6 uppercase text-blue-950 italic">Materials & Tools</h2>
            <ul class="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg font-bold text-blue-800" id="materials-list"></ul>
        </section>

        <div id="steps-container" class="space-y-16"></div>

        <div id="conclusion-target" class="mt-20"></div>

    </main>

    <script>
        // ==========================================
        // SINGLE DATA OBJECT: EDIT EVERYTHING HERE
        // ==========================================
        const projectData = {
            intro: "For the 2025 National Rocketry Challenge, I worked with a team to design, build, and launch a high-performance rocket tailored to specific flight mission requirements. The goal was to reach a precise altitude and return a sensitive payload safely to the ground, requiring a perfect blend of aerospace engineering and hands-on fabrication.",
            
            materials: [
                "Airframe: Cardboard & Lightweight Fin Stock",
                "Electronics: Flight Altimeters & Telemetry",
                "Systems: Ignition & Deployment Charges",
                "Recovery: Parachute Deployment System",
                "Ground: Launch Pad Electronics & Controller"
            ],

            phases: [
                {
                    title: "Design and Launch Operations",
                    // Add your flight/build photos to this array
                    gallery: ["rocketup1.jpeg","rocketup2.jpeg ", "rocketup3.jpg ", "Screenshot 2026-04-21 205135.png ", "Screenshot 2026-04-21 205143.png", " Screenshot 2026-04-21 205147.png "], 
                    text: "To meet the competition’s strict standards, I used specialized materials like cardboard airframes and lightweight fins to keep the rocket as efficient as possible. I was responsible for the flight electronics and recovery systems, which involved installing and testing the altimeters and soldering the connections for the ignition and deployment charges. During the assembly, I managed the center of gravity and pressure to ensure flight stability, and on launch day, I handled the motor preparation and pad electronics. Through several test flights, I analyzed data to make adjustments to the rocket’s weight and drag, ultimately achieving a stable flight path and a successful parachute deployment for a safe recovery."
                }
            ],

            conclusion: "This project allowed me to apply aerospace engineering principles in a high-pressure, competitive environment. I strengthened my skills in data analysis, electronics integration, and team collaboration while solving real-world physics problems. Successfully competing in a national challenge demonstrated my ability to manage a complex technical project from the initial design phase through to a successful field launch."
        };

        // ==========================================
        // RENDER LOGIC (DO NOT EDIT BELOW)
        // ==========================================

        document.getElementById('intro-text').innerText = projectData.intro;

        const matTarget = document.getElementById('materials-list');
        projectData.materials.forEach(m => {
            const li = document.createElement('li');
            li.className = "flex items-start";
            li.innerHTML = m;
            matTarget.appendChild(li);
        });

        const container = document.getElementById('steps-container');
        projectData.phases.forEach((step, index) => {
            const section = document.createElement('section');
            const isEven = index % 2 === 0;
            section.className = `flex flex-col ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} items-center gap-10`;

            let imageHTML = `<div class="flex gap-4 overflow-x-auto hide-scroll p-2 snap-x">`;
            step.gallery.forEach(img => {
                imageHTML += `<div class="min-w-full snap-center"><img src="images/${img}" class="w-full h-80 object-cover rounded-2xl shadow-md border border-white"></div>`;
            });
            imageHTML += `</div><p class="text-center text-[10px] font-bold uppercase text-blue-400 mt-2">← Swipe Gallery →</p>`;

            section.innerHTML = `
                <div class="w-full md:w-1/2 glass-panel p-4 rounded-3xl overflow-hidden">${imageHTML}</div>
                <div class="w-full md:w-1/2 glass-panel p-8 rounded-[30px]">
                    <p class="text-blue-500 font-black text-xs uppercase mb-2 tracking-widest">Phase 0${index + 1}</p>
                    <h3 class="text-2xl font-black text-blue-900 mb-4 italic uppercase tracking-tighter">${step.title}</h3>
                    <p class="text-lg leading-relaxed font-medium text-blue-900/80">${step.text}</p>
                </div>`;
            container.appendChild(section);
        });

        const conclusionTarget = document.getElementById('conclusion-target');
        conclusionTarget.innerHTML = `
            <section class="glass-panel p-10 rounded-[40px] text-center max-w-4xl mx-auto mb-20">
                <h2 class="text-3xl font-black mb-6 uppercase tracking-tight text-blue-950 italic">Mission Summary</h2>
                <p class="text-xl leading-relaxed text-blue-900/90 font-medium italic">"${projectData.conclusion}"</p>
            </section>`;
    </script>
</body>
</html>
